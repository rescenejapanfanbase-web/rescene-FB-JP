name: Sync Notion Streaming Guide

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */3 * * *"

permissions:
  contents: write

concurrency:
  group: notion-streaming-guide-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Sync and push streaming guide
        shell: bash
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_STREAMING_DATA_SOURCE_ID: ${{ vars.NOTION_STREAMING_DATA_SOURCE_ID }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3; do
            echo "ストリーミングガイド同期を実行します（${attempt}/3）"
            git fetch origin "${branch}"
            git reset --hard "origin/${branch}"

            node scripts/sync-notion-streaming.mjs
            node scripts/generate-home-guides.mjs

            if git diff --quiet -- data/streaming-guide.json data/streaming-guide-data.js assets/streaming/notion data/home-guides.json; then
              echo "ストリーミングガイドに変更はありません。"
              exit 0
            fi

            git add data/streaming-guide.json data/streaming-guide-data.js assets/streaming/notion data/home-guides.json
            git commit -m "chore: sync streaming guide from Notion"

            if git push origin "HEAD:${branch}"; then
              echo "ストリーミングガイドを更新しました。"
              exit 0
            fi

            echo "push中に別の更新が入りました。最新のmainから再同期します。"
            sleep $((attempt * 5))
          done

          echo "3回試行しましたが更新を反映できませんでした。"
          exit 1
