name: Build Site Preview

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: site-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install preview dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml playwright
          python -m playwright install --with-deps chromium

      - name: Run quality gate
        run: ./scripts/run-prepublish-checks.sh

      - name: Render responsive screenshots
        run: python scripts/visual-smoke.py

      - name: Package preview
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile
          root=Path('.')
          output=Path('artifacts/rescene-site-preview.zip')
          output.parent.mkdir(parents=True,exist_ok=True)
          excluded={'.git','artifacts','node_modules','__pycache__'}
          with zipfile.ZipFile(output,'w',zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob('*')):
                  if not path.is_file() or any(part in excluded for part in path.parts):
                      continue
                  archive.write(path,path.as_posix())
          PY

      - name: Upload preview and screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rescene-site-preview-${{ github.run_id }}
          path: |
            artifacts/rescene-site-preview.zip
            artifacts/visual-smoke
            data/quality-report.json
          if-no-files-found: warn
