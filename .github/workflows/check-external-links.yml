name: Check External Links

on:
  workflow_dispatch:

  schedule:
    - cron: "32 20 * * *"

  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "data/voting-guide.json"
      - "data/streaming-guide.json"
      - "data/official-links.json"
      - "scripts/check-external-links.py"
      - ".github/workflows/check-external-links.yml"
      - "EXTERNAL-LINK-CHECK-GUIDE.txt"
      - "!data/external-link-report.json"

concurrency:
  group: external-link-check
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  check-external-links:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check, publish, and commit external-link report
        id: linkcheck
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="${GITHUB_REF_NAME:-main}"
          final_result=""

          for attempt in 1 2 3; do
            echo "外部リンク確認を実行します（${attempt}/3）"

            # 実行開始直前にmainの最新状態へ合わせる。
            # push直前に別の更新が入った場合もrebaseせず、最新状態から
            # レポートを再生成することでJSON同士の競合を防ぐ。
            git fetch origin "${branch}"
            git reset --hard "origin/${branch}"

            set +e
            python3 scripts/check-external-links.py \
              --report data/external-link-report.json \
              --issue-body .external-link-issue.md \
              --workers 12 \
              --fail-on-broken
            result=$?
            set -e

            if [ "$result" -eq 1 ] || [ "$result" -gt 2 ]; then
              echo "Unexpected checker exit code: $result" >&2
              exit "$result"
            fi
            final_result="$result"

            git add data/external-link-report.json

            if git diff --cached --quiet; then
              echo "外部リンクレポートの変更はありません。"
              echo "result=${final_result}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git commit -m "chore: update external link report"

            if git push origin "HEAD:${branch}"; then
              echo "外部リンクレポートを更新しました。"
              echo "result=${final_result}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "push中に別の更新が入りました。最新のmainから再確認します。"
            sleep $((attempt * 5))
          done

          echo "3回試行しましたが、外部リンクレポートを反映できませんでした。" >&2
          exit 1

      - name: Upload detailed report
        uses: actions/upload-artifact@v7
        with:
          name: external-link-report-${{ github.run_number }}
          path: |
            data/external-link-report.json
            .external-link-issue.md
          retention-days: 30
          if-no-files-found: error

      - name: Create or update broken-link Issue
        if: steps.linkcheck.outputs.result == '2'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "[自動チェック] 外部リンク切れを検出"
        shell: bash
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search "${ISSUE_TITLE} in:title" --json number,title --limit 20 --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file .external-link-issue.md
            gh issue comment "$existing" --body "最新の自動チェック結果へ更新しました。Actions run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          else
            gh issue create --title "$ISSUE_TITLE" --body-file .external-link-issue.md
          fi

      - name: Close resolved broken-link Issue
        if: steps.linkcheck.outputs.result == '0'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "[自動チェック] 外部リンク切れを検出"
        shell: bash
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search "${ISSUE_TITLE} in:title" --json number,title --limit 20 --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "外部リンク切れが0件になったため、自動で閉じます。"
          fi

      - name: Fail when definite broken links exist
        if: steps.linkcheck.outputs.result == '2'
        run: |
          echo "Definite broken external links were found. Check the report and GitHub Issue." >&2
          exit 1
