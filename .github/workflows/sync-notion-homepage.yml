name: Sync Notion Homepage Content

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"

permissions:
  contents: write

concurrency:
  group: notion-homepage-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Sync and push homepage content
        shell: bash
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_HOMEPAGE_DATA_SOURCE_ID: ${{ vars.NOTION_HOMEPAGE_DATA_SOURCE_ID }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            echo "ホーム・共通表示同期を実行します（${attempt}/3）"
            git fetch origin "${branch}"
            git reset --hard "origin/${branch}"
            node scripts/sync-notion-homepage.mjs
            if git diff --quiet -- data/homepage.json data/homepage-data.js assets/home/notion; then
              echo "ホーム・共通表示に変更はありません。"
              exit 0
            fi
            git add data/homepage.json data/homepage-data.js assets/home/notion
            git commit -m "chore: sync homepage content from Notion"
            if git push origin "HEAD:${branch}"; then
              echo "ホーム・共通表示を更新しました。"
              exit 0
            fi
            echo "push中に別の更新が入りました。最新のmainから再同期します。"
            sleep $((attempt * 5))
          done
          echo "3回試行しましたが更新を反映できませんでした。"
          exit 1
