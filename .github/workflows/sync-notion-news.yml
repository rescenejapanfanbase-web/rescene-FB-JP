name: Sync Notion News

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-content-write
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Sync news from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_NEWS_DATA_SOURCE_ID: ${{ vars.NOTION_NEWS_DATA_SOURCE_ID }}
        run: node scripts/sync-notion-news.mjs

      - name: Commit news changes
        shell: bash
        run: |
          if git diff --quiet -- data/news.json data/news-data.js; then
            echo "ニュースの変更はありません。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news-data.js
          git commit -m "chore: sync news from Notion"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
