name: Sync Notion Official Links

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-content-write
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Sync and push official links
        shell: bash
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_OFFICIAL_LINKS_DATA_SOURCE_ID: ${{ vars.NOTION_OFFICIAL_LINKS_DATA_SOURCE_ID }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME}"

          for attempt in 1 2 3; do
            echo "公式リンク同期を実行します（${attempt}/3）"
            git fetch origin "${branch}"
            git reset --hard "origin/${branch}"

            node scripts/sync-notion-official-links.mjs

            if git diff --quiet -- data/official-links.json data/official-links-data.js assets/links/notion; then
              echo "公式リンクに変更はありません。"
              exit 0
            fi

            git add data/official-links.json data/official-links-data.js assets/links/notion
            git commit -m "chore: sync official links from Notion"

            if git push origin "HEAD:${branch}"; then
              echo "公式リンクを更新しました。"
              exit 0
            fi

            echo "push中に別の更新が入りました。最新のmainから再同期します。"
            sleep $((attempt * 5))
          done

          echo "3回試行しましたが更新を反映できませんでした。"
          exit 1
